<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmez votre inscription</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 32px 16px;
      background: #eaf5f3;
      color: #082a2a;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="
              max-width: 560px;
              overflow: hidden;
              border-radius: 16px;
              background: #0b302b;
              color: #fffdf4;
              box-shadow: 0 20px 50px rgba(7, 26, 23, 0.22);
            "
          >
            <tr>
              <td
                style="
                  height: 5px;
                  background: #f2c94c;
                  font-size: 0;
                  line-height: 0;
                "
              >
                &nbsp;
              </td>
            </tr>

            <tr>
              <td style="padding: 40px 32px">
                <p
                  style="
                    margin: 0;
                    color: #7ccf9c;
                    font-size: 12px;
                    font-weight: 700;
                    letter-spacing: 2px;
                    text-transform: uppercase;
                  "
                >
                  Cyclostratège
                </p>

                <h1
                  style="
                    margin: 14px 0 0;
                    color: #fffdf4;
                    font-size: 30px;
                    line-height: 1.2;
                  "
                >
                  Confirmez votre inscription
                </h1>

                <p
                  style="
                    margin: 24px 0 0;
                    color: #bfd1c6;
                    font-size: 16px;
                    line-height: 1.7;
                  "
                >
                  Bonjour {{ .Data.manager_name }},
                </p>

                <p
                  style="
                    margin: 14px 0 0;
                    color: #bfd1c6;
                    font-size: 16px;
                    line-height: 1.7;
                  "
                >
                  Votre identité de directeur sportif a bien été créée.
                  Confirmez maintenant votre adresse e-mail pour valider
                  votre compte Cyclostratège.
                </p>

                <p style="margin: 30px 0">
                  <a
                    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
                    style="
                      display: inline-block;
                      border-radius: 8px;
                      background: #f2c94c;
                      color: #071a17;
                      font-size: 14px;
                      font-weight: 800;
                      letter-spacing: 1px;
                      padding: 15px 22px;
                      text-decoration: none;
                      text-transform: uppercase;
                    "
                  >
                    Confirmer mon adresse e-mail
                  </a>
                </p>

                <p
                  style="
                    margin: 0;
                    color: #9fb5a8;
                    font-size: 13px;
                    line-height: 1.6;
                  "
                >
                  Ce lien est personnel. Ne le transmettez à personne.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
